# BMS 测试用例生成平台 — nginx 反向代理示例(Task 13)
# 放到 /etc/nginx/conf.d/bms.conf 后 nginx -t && systemctl reload nginx
#
# 要点:统一入口,/api 反代后端;SSE 路径关闭缓冲;限制上传体积;
#      严禁裸暴露后端端口/公网 IP(只让 nginx 对外)。

upstream bms_backend {
    server 127.0.0.1:7008;   # uvicorn/gunicorn 监听地址(仅本机)
}

server {
    listen 80;
    server_name _;            # 换成你的内网域名/IP

    # 上传体积上限(与 MAX_UPLOAD_MB 对齐,留余量)
    client_max_body_size 60m;

    # 前端静态资源(由前端团队产出后放这里;没有前端时此处可指向测试控制台)
    # root /var/www/bms-frontend;
    # location / { try_files $uri $uri/ /index.html; }

    # 没有独立前端时,直接把根路径反代到后端内置测试控制台
    location = / {
        proxy_pass http://bms_backend/;
        proxy_set_header Host $host;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://bms_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 700s;   # 生成耗时较长(32B),放宽
    }

    # SSE 进度流:必须关闭缓冲,否则前端收不到实时事件
    location ~ ^/api/tasks/.+/stream$ {
        proxy_pass http://bms_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;        # 关键:关闭缓冲
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 700s;
    }
}
